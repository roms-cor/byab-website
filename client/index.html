    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Attio",
      "description": "Powerful, flexible, and intuitive CRM designed for modern teams.",
      "url": "/"
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Attio",
      "description": "A modern CRM platform designed for tech-savvy professionals. Build meaningful relationships with your customers at scale.",
      "url": "/",
      "logo": "/favicon.png"
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Attio CRM",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Powerful, flexible, and intuitive CRM designed for modern teams. Features include real-time reporting, custom objects, API access, team collaboration, and enterprise security.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD",
          "description": "For individuals and small teams getting started. Up to 1,000 contacts."
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "29",
          "priceCurrency": "USD",
          "description": "For growing teams that need more power. Unlimited contacts, advanced reporting, API access."
        }
      ]
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How long does it take to set up Attio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most teams are up and running in under 15 minutes. Import your data, customize your views, and you're ready to go."
          }
        },
        {
          "@type": "Question",
          "name": "Can I migrate from another CRM to Attio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. We support one-click migration from Salesforce, HubSpot, Pipedrive, and other major CRMs. CSV imports are also available."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a free plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. Our Free plan includes up to 1,000 contacts and core CRM features. No credit card required to get started."
          }
        },
        {
          "@type": "Question",
          "name": "What kind of support does Attio offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All plans include email support. Pro plans get priority support with 4-hour response times. Enterprise plans include a dedicated customer success manager."
          }
        }
      ]
    }
    </script>

    <script type="application/ld+json">
